global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    monitor: 'hunyi-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'hunyi-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8081']
        labels:
          service: 'hunyi-backend'
    scrape_interval: 10s
    honor_labels: true

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
        labels:
          service: 'clickhouse'
    scrape_interval: 30s

  - job_name: 'mqtt-broker'
    static_configs:
      - targets: ['mqtt:18083']
        labels:
          service: 'emqx'
    scrape_interval: 30s
    metrics_path: '/api/v5/prometheus/auth'
    basic_auth:
      username: 'admin'
      password: 'public'
